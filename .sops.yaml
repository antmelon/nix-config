  # Melchior - Home Server
  - &melchior age1kd4x5v53fshwaadhz48lfx36lj9xpddhr5wsg3zuglge0vm50aps9ganwp
  
  # Balthasar - Desktop
  - &balthasar age1g2zcadsn7ygy08n30kgh920w9w27aum960vgrhyencp3cuzpc4rsaqxxvp

creation_rules:
  # Casper secrets (MacBook Pro)
  - path_regex: secrets/casper\.yaml$
    key_groups:
      - age:
          - *personal
          # - *casper
  
  # Melchior secrets (Home Server)
  - path_regex: secrets/melchior\.yaml$
    key_groups:
      - age:
          - *personal
          - *melchior
          - *balthasar
  
  # Balthasar secrets (Desktop)
  - path_regex: secrets/balthasar\.yaml$
    key_groups:
      - age:
          - *personal
          - *balthasar
  
  # Shared secrets (accessible from all machines)
  - path_regex: secrets/shared\.yaml$
    key_groups:
      - age:
          - *personal
          # - *casper
          - *melchior
          - *balthasar

